services:
  broker:
    # Image is built by scripts/docker-build-broker.sh from `git archive HEAD`,
    # NOT from the host working tree. `docker compose up -d` deliberately does
    # NOT --build here -- a dirty working tree would otherwise silently ship
    # uncommitted WIP into the broker binary. To rebuild:
    #   scripts/docker-build-broker.sh && docker compose up -d
    image: remote-claude-broker:latest
    container_name: broker
    restart: unless-stopped
    environment:
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
    ports:
      - "${PORT:-9999}:9999"
    volumes:
      # Session cache + auth data (read-write) -- volume name kept for data continuity
      - concentrator-data:/data/cache
      # Backup destination (bind-mount so host cron / rsync can access archives)
      - ${BACKUP_DIR:-./backups}:/data/backups
      # Frontend assets (mount over baked-in copy for hot rebuilds: bun run build:web)
      - ./web/dist:/srv/web:ro
      # Recap templates (mount over baked-in copy so .yml edits are live without a
      # rebuild -- the loader prefers /srv/recap-templates when present)
      - ./recap-templates:/srv/recap-templates:ro
    command:
      - "--web-dir"
      - "/srv/web"
      - "--cache-dir"
      - "/data/cache"
      - "--rp-id"
      - "${RP_ID:-localhost}"
      - "--origin"
      - "${ORIGIN:-http://localhost:9999}"
      - "--rclaude-secret"
      - "${RCLAUDE_SECRET}"
      - "--verbose"
    networks:
      - caddy
    labels:
      # Caddy reverse proxy labels (caddy-docker-proxy)
      caddy: "${CADDY_HOST:-}"
      caddy.import: "tls_cloudflare"
      caddy.reverse_proxy: "{{upstreams 9999}}"
      # Keep WS connections alive for 5 min during Caddy config reloads
      # (other container starts/stops trigger reloads that would kill all WS)
      caddy.reverse_proxy.stream_close_delay: "5m"

volumes:
  concentrator-data:
    # External so worktree compose runs cannot create parallel empty volumes
    # and `docker compose down -v` cannot destroy it. Pinned to the existing
    # scoped name to preserve data in place (no migration). To recreate from
    # scratch: `docker volume create remote-claude_concentrator-data`.
    external: true
    name: remote-claude_concentrator-data

networks:
  caddy:
    external: true
