id: project-recap
label: Project recap
description: The reflective development recap -- features, fixes, decisions, dead ends, frustrations, open questions. The default deliverable.
scope: fleet
audience: human
defaults:
  retrospect: false
  customerFriendly: false
  signals: [user_prompts, assistant_final_turn, commits, task_results, tool_summaries, errors_hooks, cost, open_questions, agent_status]
sections: [features, bugs, fixes, incidents, decisions, dead_ends, gotchas, frustrations, open_questions]
options:
  # Prompt-tweak (no signal): exposed as options.link_conversations in the body.
  # Default ON preserves the anchor byte-for-byte (the override below renders
  # nothing when true). Set false for a "just the data" recap -- prose + commit
  # hashes only, no conversation ids/links in the body.
  - id: link_conversations
    label: Link conversations
    default: true

# ANCHOR TEMPLATE -- reproduces today's all-projects HUMAN recap BYTE-IDENTICALLY.
# ONE body, TWO framings: the `path` discriminator selects the oneshot framing
# (extract from transcripts) or the synthesize framing (refine merged facts), but
# the deliverable CONTRACT -- the two large fixed specs injected as
# `{{ frontmatter_spec }}` / `{{ body_spec }}` -- is emitted ONCE after the branch.
# That single injection is what makes the oneshot and synthesize paths share an
# identical contract (they cannot drift). The framing text is the presentation the
# template owns; scope_label / period are interpolated. `body: |-` strips the
# trailing newline so the rendered string ends exactly at the body spec.
body: |-
  {%- if path == "synthesize" -%}
  You are SYNTHESIZING the final recap for project {{ scope_label }},
  covering {{ period.human }} ({{ period.iso_range }}). The reader is a human reading a development recap.

  The facts below were already EXTRACTED from the period's transcripts in parallel
  (map stage) and MERGED + de-duplicated IN CODE. Your job is JUDGMENT and PROSE,
  NOT extraction:
    - REFINE the merged items: collapse near-duplicates the code merge missed
      (same thing, different wording), keep the most specific title, merge details.
    - PRESERVE every citation (conversation ids, commit hashes) and every
      "inferred" flag exactly as given -- never upgrade an inference to a fact.
    - DO NOT invent items, citations, or facts that are not in the merged input
      OR the FORGOTTEN_THREADS block below (the latter is authoritative,
      deterministic data -- render it, don't second-guess it).
      You have no transcripts here; everything else you state must trace to the input.
    - DROP anything genuinely empty; never pad to fill a section.

  Output format: a YAML frontmatter block (between --- lines) followed by the
  markdown body. The frontmatter is parsed and indexed -- carry the merged facts
  into it faithfully.
  {%- else -%}
  You are writing a comprehensive development recap for project {{ scope_label }}
  covering {{ period.human }} ({{ period.iso_range }}).

  Output format: a YAML frontmatter block (between --- lines) followed by markdown body.
  The frontmatter is parsed and indexed -- be specific so future searches find this recap.

  GROUND RULES:
    - GROUND EVERY CLAIM. The input includes real COMMITS (with files-changed and
      +/- line counts) and TASKS. Tie features/bugs/fixes to specific commit
      hashes (7-char) and conversation ids (8-char), and name real files + project
      terms verbatim -- "rebuilt admin/files.tsx (a1b2c3d)", NOT "admin work".
    - FACT vs INFERENCE. A claim backed by a commit/task is a FACT. A claim read
      from transcript text only is an INFERENCE -- mark it inferred (frontmatter
      `inferred: true`, or [inferred] in prose). Never dress inference as fact.
    - Vague, abstracted summaries are a failure. Be concrete and specific.
  {%- endif %}

  {{ frontmatter_spec }}

  {{ body_spec }}
  {%- if options.link_conversations == false %}

  NO CONVERSATION LINKS (this OVERRIDES every "link conversations via [text](/sessions/conv_xxx)" and "cite the conversation" directive in the body format above): do NOT emit any conversation links or conversation ids ANYWHERE in the body -- this is a "just the data" recap. Drop the "## Notable conversations" section ENTIRELY. In "## Loose ends -- forgotten threads", still render every thread, but name it by its title/synthesis WITHOUT the [label](/sessions/conv_xxx) link. KEEP commit hashes and all other facts -- only conversation references are removed.
  {%- endif %}
